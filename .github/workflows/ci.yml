name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: streamlit-aws-tools/requirements.txt

      - name: Install dependencies
        working-directory: streamlit-aws-tools
        run: pip install -r requirements.txt pytest pytest-mock

      - name: Run tests
        working-directory: streamlit-aws-tools
        run: pytest tests/ -v
